name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 02:00 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dump Supabase database
        run: |
          mkdir -p backups
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-acl \
            -f "backups/backup-$(date +%Y%m%d).sql"

      - name: Commit backup
        run: |
          git config user.email "backup@auto"
          git config user.name "Auto Backup"
          git add backups/backup-*.sql
          git commit -m "chore: weekly backup $(date +%Y-%m-%d)" || echo "No changes"
          git push
